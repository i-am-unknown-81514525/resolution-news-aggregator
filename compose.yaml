services:
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml" # Use a file, not the socket
      - "--entrypoints.web.address=:9417"
    ports:
      - "9417:9417"
    volumes:
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      - RUST_LOG=debug
    restart: unless-stopped
    volumes:
      - ./config.toml:/app/config.toml:ro
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped